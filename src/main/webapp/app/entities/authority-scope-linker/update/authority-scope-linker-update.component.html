<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        id="jhi-authority-scope-linker-heading"
        data-cy="AuthorityScopeLinkerCreateUpdateHeading"
        jhiTranslate="monoEcomApp.authorityScopeLinker.home.createOrEditLabel"
      >
        Create or edit a Authority Scope Linker
      </h2>

      <div>
        <jhi-alert-error />

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id" jhiTranslate="monoEcomApp.authorityScopeLinker.id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_authority" jhiTranslate="monoEcomApp.authorityScopeLinker.authority">Authority</label>
          <select
            class="form-control"
            id="field_authority"
            data-cy="authority"
            name="authority"
            formControlName="authority"
            [compareWith]="compareAuthority"
          >
            <option [ngValue]="null"></option>
            @for (authorityOption of authoritiesSharedCollection; track $index) {
              <option [ngValue]="authorityOption">{{ authorityOption.name }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_scope" jhiTranslate="monoEcomApp.authorityScopeLinker.scope">Scope</label>
          <select class="form-control" id="field_scope" data-cy="scope" name="scope" formControlName="scope" [compareWith]="compareScope">
            <option [ngValue]="null"></option>
            @for (scopeOption of scopesSharedCollection; track $index) {
              <option [ngValue]="scopeOption">{{ scopeOption.id }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
