<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (scope(); as scopeRef) {
      <div>
        <h2 data-cy="scopeDetailsHeading"><span jhiTranslate="monoEcomApp.scope.detail.title">Scope</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ scopeRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="monoEcomApp.scope.name">Name</span></dt>
          <dd>
            <span>{{ scopeRef.name }}</span>
          </dd>
          <dt><span jhiTranslate="monoEcomApp.scope.description">Description</span></dt>
          <dd>
            <span>{{ scopeRef.description }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/scope', scopeRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
